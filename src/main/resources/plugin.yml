name: CustomItemManager
api-version: 1.21
version: ${version}
main: ru.yolta.customitemmanager.CustomItemManager

description: A powerful and centralized custom item management plugin.
author: YoLTa
website: https://hangar.papermc.io/randomlychosenname/CustomItemManager

load: POSTWORLD
prefix: CustomItemManager

permissions:
  customitemmanager.*:
    description: Gives absolute access to all CustomItemManager commands and features.
    default: op
    children:
      customitemmanager.command: true
      customitemmanager.command.add: true
      customitemmanager.command.remove: true
      customitemmanager.command.give: true
      customitemmanager.command.list: true
      customitemmanager.command.reload: true
      customitemmanager.command.help: true

  customitemmanager.command:
    description: Allows the use of the /cim command.
    default: op

  customitemmanager.command.add:
    description: Allows the use of the /cim add command.
    default: op
    children:
      customitemmanager.command: true

  customitemmanager.command.remove:
    description: Allows the use of the /cim remove command.
    default: op
    children:
      customitemmanager.command: true

  customitemmanager.command.give:
    description: Allows the use of the /cim give command.
    default: op
    children:
      customitemmanager.command: true

  customitemmanager.command.list:
    description: Allows the use of the /cim list command.
    default: op
    children:
      customitemmanager.command: true

  customitemmanager.command.reload:
    description: Allows the use of the /cim reload command.
    default: op
    children:
      customitemmanager.command: true

  customitemmanager.command.help:
    description: Allows the use of the /cim help command.
    default: op
    children:
      customitemmanager.command: true

commands:
  customitemmanager:
    description: The main command for CustomItemManager.
    usage: /<command> <add|remove|give|list|help|reload>
    permission: customitemmanager.command
    permission-message: You do not have permission to use this command.
    aliases: [cim, cimanager]